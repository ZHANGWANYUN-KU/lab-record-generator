<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="实验室记录生成器 - 用于创建和管理实验记录">
    <title>实验室记录生成器 | Lab Record Generator</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">

    <style>
        /* 自定义衬线字体 */
        .font-serif {
            font-family: 'Crimson Text', 'Times New Roman', serif;
        }

        /* 打印样式优化 */
        @media print {

            /* 纸张大小由 React 动态注入 */
            @page {
                margin: 0;
            }

            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                background: white;
            }

            .no-print {
                display: none !important;
            }

            .print-visible {
                display: block !important;
                height: 100%;
                overflow: visible !important;
            }

            /* 打印时重置布局 */
            #root,
            .app-container {
                display: block;
                height: auto;
                overflow: visible;
            }
        }

        /* 加载动画 */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="bg-gray-100 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 图标组件 (SVG 格式) ---
        const IconPrinter = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
        );
        const IconPlus = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        );
        const IconTrash2 = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
        );
        const IconFlaskConical = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10 2v7.527a2 2 0 0 1-.211.896L4.72 20.55a1 1 0 0 0 .9 1.45h12.76a1 1 0 0 0 .9-1.45l-5.069-10.127A2 2 0 0 1 14 9.527V2"></path><path d="M8.5 2h7"></path><path d="M7 16h10"></path></svg>
        );
        const IconRotateCcw = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
        );
        const IconX = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        );
        const IconClock = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        );
        const IconCalendar = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        );
        const IconSparkles = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z"></path><path d="M5 3v4"></path><path d="M19 17v4"></path><path d="M3 5h4"></path><path d="M17 19h4"></path></svg>
        );

        // --- Gemini API Helper ---
        const callGemini = async (prompt, systemInstruction = "") => {
            const apiKey = ""; // API Key provided by the environment
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] }
            };

            let delay = 1000;
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error('API Error');
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (error) {
                    if (i === 4) throw error;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }
        };

        // --- 纸张尺寸定义 ---
        const PAPER_SIZES = {
            '16K': { width: '195mm', height: '270mm', name: '16K (195x270mm)' },
            'A4': { width: '210mm', height: '297mm', name: 'A4 (210x297mm)' },
            'Letter': { width: '215.9mm', height: '279.4mm', name: 'Letter (8.5x11")' }
        };

        // --- 主组件 ---
        const App = () => {
            // 初始数据结构
            const initialSections = [
                {
                    id: 'sec-objects',
                    title: '1. Materials & Objects',
                    type: 'mixed-list',
                    items: [
                        { id: 'item-1', type: 'animal', animalType: 'Mouse', age: 'E14', group: 'Con', side: 'Right', note: '' },
                        { id: 'item-2', type: 'animal', animalType: 'Pup', age: 'P13', group: 'Exp 1', side: 'Left', note: '' },
                        { id: 'item-3', type: 'animal', animalType: 'Mouse', age: 'P15', group: 'Exp 2', side: 'Right', note: '' },
                        { id: 'item-4', type: 'animal', animalType: 'Pup', age: 'P14', group: 'Con', side: 'Right', note: '' }
                    ]
                },
                {
                    id: 'sec-plasmid',
                    title: '2. Plasmid Information',
                    type: 'text',
                    content: 'Name: pEGFP-C1-GeneX\nAntibiotic: Kanamycin\nSize: ~5.9 kb\nFeatures: \n  - Promoter: CMV IE\n  - Tag: EGFP (N-term)\n  - Cloning sites: EcoRI / BamHI'
                },
                {
                    id: 'sec-protocol',
                    title: '3. Protocol',
                    type: 'protocol-sections',
                    subsections: [
                        {
                            id: 'subsec-iue',
                            title: 'IUE',
                            content: '1. Prepare all instruments and reagents before starting.\n2. Connect the platinum-plated electrodes (P13 or P14) to the electroporator (red-to-red, black-to-black). Power on the system, click New Protocol → select E15 → switch to Standby.\n3. Surface-sterilize and set out all supplies: Pasteur pipette, saline, scissors, sutures (needle/thread), mouth-controlled micropipette, pipettes/tips, DNA sample (30 µl), trypan blue (2.5 µl), tissues, cello tape, light source, surgical stage, and forceps.\n4. Load 2–3 ml isoflurane into the anesthesia unit using a glass syringe. Press Fast Forward and tighten securely. Set Air: 200 ml and Isoflurane: 1–2%, then lock the settings.\n5. Position the anesthesia tubing at the mouse’s nose and secure it with cello tape.\n6. Insert the capillary into the rubber tubing (use a small paper strip for stability). Fill with DNA solution and test on tissue to confirm smooth flow.\n7. Prepare the stage with a tissue towel and secure it with cello tape.\n8. Prepare a 1-ml syringe with 50 µl pentobarbital, diluted 5× with saline (final volume 250 µl).\n9. Gently handle the timed-pregnant mouse. Briefly touch the injection site, then inject 0.3 ml pentobarbital intraperitoneally. Return the mouse to the cage for 3–4 min until fully anesthetized. Place it on the stage and tape the limbs (forelimbs up, hindlimbs down).\n10. Disinfect the abdomen with 70% ethanol. Make a midline incision through the outer skin using large forceps and scissors. Remove any attached muscle, add saline, then open the thin inner membrane along the white midline using small forceps and scissors.\n11. Retract the inner membrane laterally with two scissors. Cover the exposed area with tissue, add saline, and adjust the opening as needed.\n12. Gently lift E15 embryos with ring forceps and keep them moist with saline. Confirm the skull midline. Inject DNA into the right lateral ventricle using a mouth-controlled micropipette. Blue dye in the ventricle confirms successful injection.\n13. Deliver pulses while keeping the area moist with saline: 50 ms square pulses, 1 Hz, 5 pulses. Place the positive electrode on the injection side.\nNote: Inject as many embryos as possible within 30–45 min from the start of the procedure.\n14. Return embryos to the abdominal cavity, add saline, and suture the inner and outer layers. Secure with knots at the top and bottom.\n15. Place the mouse in a cage on a 38°C slide warmer. Disinfect the work area and instruments with 70% ethanol.',
                            selected: false
                        },
                        {
                            id: 'subsec-perfusion',
                            title: 'Perfusion',
                            content: '1. CAG-GCaMP–positive mice were examined under a compound microscope using a blue filter in the dark.\n2. Mice were anesthetized by intraperitoneal injection of 0.3 ml pentobarbital.\n3. A midline incision was made until the rib cage was visible, and the tissue was carefully opened to both sides. The rib cage was gently lifted/punctured with a pipette tip and held back to fully expose the heart.\n4. Transcardial perfusion was performed with saline (15–20 ml per mouse) by injecting into the left ventricle, ensuring there were no air bubbles in the tubing, and opening the right atrium to completely flush blood from the circulation.\nNote: Perfusion was stopped once the organs changed from red to pale/white.\n5. The head was separated from the body; the skin was opened along the midline and attached muscles were removed.\n6. The skull was opened near the cerebellar region by cutting along the midline and both sides.\n7. The skull was lifted upward and removed.\n8. The brain was gently transferred into a 15-ml Falcon tube containing 2 ml of 4% PFA fixative and stored overnight at 4°C.',
                            selected: false
                        },
                        {
                            id: 'subsec-flatten',
                            title: 'Flatten',
                            content: '1. Separate the right and left cerebral hemispheres, rinse in 1× PBS 500 ml — 1× PBS: 50 ml 10× PBS in 450 ml MQ, and remove any extra attached tissue.\n2. Sandwich the tissues between two clean, non-coated glass slides by placing small pieces of glass on both sides, and hold them tightly in place using black clips.\n3. Then immerse in 30% sucrose/2% PFA solution 15 ml — Stock 60% sucrose/15 ml — 4% PFA in a 50-ml Falcon tube.\n4. Wrap in aluminum foil, label, and store at 4°C for a maximum of 16–24 hours.',
                            selected: false
                        },
                        { id: 'subsec-imaging', title: 'Imaging', content: 'Imaging protocol steps...', selected: false },
                        { id: 'subsec-immunostaining', title: 'Immunostaining', content: 'Immunostaining protocol steps...', selected: false, timePoints: [] }
                    ]
                },
                {
                    id: 'sec-results',
                    title: '4. Expected Results & Notes',
                    type: 'text',
                    content: 'Colonies are expected on the experimental plate. The negative control (no plasmid) should show no growth. Pick single colonies for colony PCR verification.'
                }
            ];

            const [meta, setMeta] = useState({
                title: 'Plasmid Construction and Transformation Record',
                experimentId: 'EXP-2023-10-01',
                date: new Date().toISOString().split('T')[0],
                time: '14:30',
                researcher: 'Zhang Wanyun',
                labName: 'Hidenobu Mizuno lab',
                supervisor: 'Prof. Mizuno'
            });

            const [sections, setSections] = useState(initialSections);
            const [selectedSubsection, setSelectedSubsection] = useState({});
            const [paperSize, setPaperSize] = useState('16K');

            // 动态设置打印样式
            useEffect(() => {
                const size = PAPER_SIZES[paperSize];
                const styleId = 'dynamic-print-style';
                let style = document.getElementById(styleId);

                if (!style) {
                    style = document.createElement('style');
                    style.id = styleId;
                    document.head.appendChild(style);
                }

                style.innerHTML = `
                    @media print {
                        @page {
                            size: ${size.width} ${size.height};
                            margin: 0;
                        }
                    }
                `;
            }, [paperSize]);

            // AI States
            const [aiLoading, setAiLoading] = useState(false);
            const [aiMessage, setAiMessage] = useState(null);

            // 预设选项
            const researcherOptions = ["Zhang Wanyun", "John Doe", "Jane Smith", "Lab Assistant", "Other"];
            const animalTypes = ["Mouse", "Pup"];
            const animalAges = ["E14", "E15", "P13", "P14", "P15"];
            const groupOptions = ["Con", "Exp 1", "Exp 2", "WT", "KO", "Other"];
            const sideOptions = ["Right", "Left"];

            // --- 处理函数 ---
            const handleMetaChange = (e) => {
                const { name, value } = e.target;
                setMeta(prev => ({ ...prev, [name]: value }));
            };

            const handleSectionTitleChange = (id, newTitle) => {
                setSections(prev => prev.map(sec => sec.id === id ? { ...sec, title: newTitle } : sec));
            };

            const handleSectionContentChange = (id, newContent) => {
                setSections(prev => prev.map(sec => sec.id === id ? { ...sec, content: newContent } : sec));
            };

            const addListItem = (sectionId) => {
                setSections(prev => prev.map(sec => {
                    if (sec.id !== sectionId) return sec;
                    const newItem = {
                        id: `item-${Date.now()}`,
                        type: 'animal',
                        animalType: 'Mouse',
                        age: 'E14',
                        group: 'Con',
                        side: 'Right',
                        note: ''
                    };
                    return { ...sec, items: [...(sec.items || []), newItem] };
                }));
            };

            const updateListItem = (sectionId, itemId, field, value) => {
                setSections(prev => prev.map(sec => {
                    if (sec.id !== sectionId) return sec;
                    return {
                        ...sec,
                        items: (sec.items || []).map(item => item.id === itemId ? { ...item, [field]: value } : item)
                    };
                }));
            };

            const removeListItem = (sectionId, itemId) => {
                setSections(prev => prev.map(sec => {
                    if (sec.id !== sectionId) return sec;
                    return { ...sec, items: (sec.items || []).filter(item => item.id !== itemId) };
                }));
            };

            const addSection = () => {
                const newId = `sec-${Date.now()}`;
                const num = sections.length + 1;
                setSections([...sections, { id: newId, title: `${num}. New Section`, content: '', type: 'text' }]);
            };

            const removeSection = (id) => {
                setSections(prev => prev.filter(sec => sec.id !== id));
            };

            const addTimePoint = (sectionId, subsecId) => {
                setSections(prev => prev.map(sec => {
                    if (sec.id !== sectionId) return sec;
                    return {
                        ...sec,
                        subsections: sec.subsections.map(sub => {
                            if (sub.id !== subsecId) return sub;
                            const newTime = {
                                id: `time-${Date.now()}`,
                                date: new Date().toISOString().split('T')[0],
                                time: '12:00',
                                label: ''
                            };
                            return { ...sub, timePoints: [...(sub.timePoints || []), newTime] };
                        })
                    };
                }));
            };

            const updateTimePoint = (sectionId, subsecId, timeId, field, value) => {
                setSections(prev => prev.map(sec => {
                    if (sec.id !== sectionId) return sec;
                    return {
                        ...sec,
                        subsections: sec.subsections.map(sub => {
                            if (sub.id !== subsecId) return sub;
                            return {
                                ...sub,
                                timePoints: sub.timePoints.map(tp => tp.id === timeId ? { ...tp, [field]: value } : tp)
                            };
                        })
                    };
                }));
            };

            const removeTimePoint = (sectionId, subsecId, timeId) => {
                setSections(prev => prev.map(sec => {
                    if (sec.id !== sectionId) return sec;
                    return {
                        ...sec,
                        subsections: sec.subsections.map(sub => {
                            if (sub.id !== subsecId) return sub;
                            return {
                                ...sub,
                                timePoints: sub.timePoints.filter(tp => tp.id !== timeId)
                            };
                        })
                    };
                }));
            };

            // --- AI 功能 ---
            const handleAIRefineProtocol = async (sectionId, subsecId) => {
                const section = sections.find(s => s.id === sectionId);
                const subsection = section?.subsections?.find(ss => ss.id === subsecId);
                if (!subsection || !subsection.content.trim()) return;

                setAiLoading(true);
                try {
                    const refinedContent = await callGemini(
                        `Refine this laboratory protocol steps for clarity and professionalism: "${subsection.content}"`,
                        "You are a professional laboratory assistant. Provide only the refined text without preamble."
                    );
                    if (refinedContent) {
                        setSections(prev => prev.map(sec => {
                            if (sec.id !== sectionId) return sec;
                            return {
                                ...sec,
                                subsections: sec.subsections.map(sub =>
                                    sub.id === subsecId ? { ...sub, content: refinedContent.trim() } : sub
                                )
                            };
                        }));
                        setAiMessage("✨ 步骤已通过 AI 优化！");
                    }
                } catch (e) {
                    setAiMessage("❌ AI 优化失败，请稍后重试。");
                } finally {
                    setAiLoading(false);
                    setTimeout(() => setAiMessage(null), 3000);
                }
            };

            const handleAISummarize = async () => {
                setAiLoading(true);
                try {
                    const dataString = JSON.stringify({ meta, sections });
                    const summary = await callGemini(
                        `Based on this experimental data, write a concise professional summary of the experiment: ${dataString}`,
                        "You are a senior research scientist. Provide a concise summary (approx 100 words) in English."
                    );
                    if (summary) {
                        // Add summary as a new section
                        const newId = `ai-summary-${Date.now()}`;
                        setSections([...sections, { id: newId, title: "✨ AI Executive Summary", content: summary.trim(), type: 'text' }]);
                        setAiMessage("✨ 已成功生成实验摘要！");
                    }
                } catch (e) {
                    setAiMessage("❌ 摘要生成失败。");
                } finally {
                    setAiLoading(false);
                    setTimeout(() => setAiMessage(null), 3000);
                }
            };

            const handlePrint = () => {
                const originalTitle = document.title;
                const printTitle = `${meta.experimentId || 'Experiment'}_${meta.date}`;
                document.title = printTitle;
                window.print();
                setTimeout(() => {
                    document.title = originalTitle;
                }, 500);
            };

            const handleReset = () => {
                if (window.confirm('是否重置为默认模板？')) {
                    setSections(initialSections);
                    setMeta({
                        title: 'Plasmid Construction and Transformation Record',
                        experimentId: 'EXP-2023-10-01',
                        date: new Date().toISOString().split('T')[0],
                        time: '14:30',
                        researcher: 'Zhang Wanyun',
                        labName: 'Hidenobu Mizuno lab',
                        supervisor: 'Prof. Mizuno'
                    });
                }
            };

            return (
                <div className="app-container min-h-screen bg-gray-100 font-sans flex flex-col md:flex-row print:bg-white print:block">

                    {/* AI 消息提醒 */}
                    {aiMessage && (
                        <div className="fixed top-4 right-4 z-50 bg-white border border-gray-200 px-4 py-2 rounded-lg shadow-xl text-sm font-bold flex items-center gap-2 animate-bounce no-print">
                            {aiMessage}
                        </div>
                    )}

                    {/* --- 左侧面板：编辑器 --- */}
                    <div className="no-print w-full md:w-1/3 lg:w-96 bg-white border-r border-gray-200 flex flex-col h-screen sticky top-0 shadow-lg z-10">
                        <div className="p-3 border-b border-gray-200 bg-gray-50 flex items-center justify-between">
                            <div className="flex items-center gap-2 font-bold text-gray-700">
                                <IconFlaskConical className="w-5 h-5 text-gray-800" />
                                <span>实验编辑器</span>
                            </div>
                            <div className="flex gap-2">
                                <button
                                    onClick={handleAISummarize}
                                    disabled={aiLoading}
                                    className="p-1.5 text-blue-600 hover:bg-blue-50 rounded transition-colors disabled:opacity-50"
                                    title="✨ AI 总结实验"
                                >
                                    {aiLoading ? <div className="loader" /> : <IconSparkles className="w-4 h-4" />}
                                </button>
                                <button onClick={handleReset} className="text-gray-400 hover:text-red-500 transition-colors p-1.5" title="重置">
                                    <IconRotateCcw className="w-4 h-4" />
                                </button>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-4 space-y-5">
                            {/* 头部信息编辑 */}
                            <div className="space-y-2">
                                <h3 className="text-xs font-bold text-gray-400 uppercase tracking-wider">头部信息</h3>
                                <div className="grid grid-cols-1 gap-2">
                                    <input name="title" value={meta.title} onChange={handleMetaChange} placeholder="标题" className="w-full p-2 text-sm border rounded focus:ring-2 focus:ring-gray-500 outline-none font-medium" />
                                    <div className="grid grid-cols-1 gap-2">
                                        <input name="labName" value={meta.labName} onChange={handleMetaChange} placeholder="实验室名称" className="w-full p-2 text-sm border rounded focus:ring-2 focus:ring-gray-500 outline-none" />
                                        <div className="grid grid-cols-2 gap-2">
                                            <input name="experimentId" value={meta.experimentId} onChange={handleMetaChange} placeholder="实验 ID" className="w-full p-2 text-sm border rounded focus:ring-2 focus:ring-gray-500 outline-none bg-gray-50 text-gray-500" />
                                            <select value={paperSize} onChange={(e) => setPaperSize(e.target.value)} className="w-full p-2 text-sm border rounded focus:ring-2 focus:ring-gray-500 outline-none bg-white">
                                                {Object.keys(PAPER_SIZES).map(size => <option key={size} value={size}>{PAPER_SIZES[size].name}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <input type="date" name="date" value={meta.date} onChange={handleMetaChange} className="w-full p-2 text-sm border rounded focus:ring-2 focus:ring-gray-500 outline-none" />
                                        <input type="time" name="time" value={meta.time} onChange={handleMetaChange} className="w-full p-2 text-sm border rounded focus:ring-2 focus:ring-gray-500 outline-none" />
                                    </div>
                                    <div className="grid grid-cols-1 gap-2">
                                        <select name="researcher" value={meta.researcher} onChange={handleMetaChange} className="w-full p-2 text-sm border rounded focus:ring-2 focus:ring-gray-500 outline-none bg-white">
                                            <option value="" disabled>选择研究员</option>
                                            {researcherOptions.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                        </select>
                                        <input name="supervisor" value={meta.supervisor} onChange={handleMetaChange} placeholder="导师" className="w-full p-2 text-sm border rounded focus:ring-2 focus:ring-gray-500 outline-none" />
                                    </div>
                                </div>
                            </div>

                            <hr className="border-gray-200" />

                            {/* 内容块编辑器 */}
                            <div className="space-y-4">
                                <h3 className="text-xs font-bold text-gray-400 uppercase tracking-wider">内容板块</h3>

                                {sections.map((section) => (
                                    <div key={section.id} className="bg-white border border-gray-200 rounded-lg p-3 shadow-sm relative">

                                        {/* 板块标题编辑 */}
                                        <div className="flex justify-between items-center mb-2 pb-2 border-b border-gray-100">
                                            <input
                                                value={section.title}
                                                onChange={(e) => handleSectionTitleChange(section.id, e.target.value)}
                                                className="font-bold text-sm text-gray-800 w-full outline-none bg-transparent"
                                                placeholder="板块标题"
                                            />
                                            <button onClick={() => removeSection(section.id)} className="text-gray-300 hover:text-red-500 p-1">
                                                <IconTrash2 className="w-4 h-4" />
                                            </button>
                                        </div>

                                        {/* 不同类型的板块编辑逻辑 */}
                                        {section.type === 'mixed-list' ? (
                                            <div className="space-y-2">
                                                <div className="space-y-2 max-h-[400px] overflow-y-auto">
                                                    {section.items?.map((item, idx) => (
                                                        <div key={item.id} className="flex gap-2 items-start bg-gray-50 p-2 rounded text-xs border border-gray-100">
                                                            <span className="text-gray-400 mt-1 select-none font-mono font-bold w-4">{idx + 1}.</span>
                                                            <div className="flex-1 space-y-2">
                                                                <div className="flex flex-col gap-2">
                                                                    <div className="flex gap-1">
                                                                        <select
                                                                            value={item.animalType}
                                                                            onChange={(e) => updateListItem(section.id, item.id, 'animalType', e.target.value)}
                                                                            className="border rounded p-1 bg-white w-1/4 text-gray-700"
                                                                        >
                                                                            {animalTypes.map(t => <option key={t} value={t}>{t}</option>)}
                                                                        </select>
                                                                        <select
                                                                            value={item.age}
                                                                            onChange={(e) => updateListItem(section.id, item.id, 'age', e.target.value)}
                                                                            className="border rounded p-1 bg-white w-1/4 text-gray-700"
                                                                        >
                                                                            {animalAges.map(a => <option key={a} value={a}>{a}</option>)}
                                                                        </select>
                                                                        <select
                                                                            value={item.group}
                                                                            onChange={(e) => updateListItem(section.id, item.id, 'group', e.target.value)}
                                                                            className="border rounded p-1 bg-white w-1/4 text-gray-700 font-medium"
                                                                        >
                                                                            {groupOptions.map(g => <option key={g} value={g}>{g}</option>)}
                                                                        </select>
                                                                        <select
                                                                            value={item.side}
                                                                            onChange={(e) => updateListItem(section.id, item.id, 'side', e.target.value)}
                                                                            className="border rounded p-1 bg-white w-1/4 text-gray-700 font-medium"
                                                                        >
                                                                            {sideOptions.map(s => <option key={s} value={s}>{s}</option>)}
                                                                        </select>
                                                                    </div>
                                                                    <input
                                                                        value={item.note}
                                                                        onChange={(e) => updateListItem(section.id, item.id, 'note', e.target.value)}
                                                                        placeholder="详细备注 (如：品系等)..."
                                                                        className="border rounded p-1 w-full bg-white text-gray-600"
                                                                    />
                                                                </div>
                                                            </div>
                                                            <button onClick={() => removeListItem(section.id, item.id)} className="text-gray-300 hover:text-red-500 mt-1">
                                                                <IconX className="w-3 h-3" />
                                                            </button>
                                                        </div>
                                                    ))}
                                                </div>
                                                <div className="pt-1">
                                                    <button
                                                        onClick={() => addListItem(section.id)}
                                                        className="w-full py-1.5 text-xs border border-blue-200 text-blue-600 rounded hover:bg-blue-50 flex justify-center items-center gap-1 transition-colors"
                                                    >
                                                        <IconPlus className="w-3 h-3" /> 添加样本
                                                    </button>
                                                </div>
                                            </div>
                                        ) : section.type === 'protocol-sections' ? (
                                            <div className="space-y-3">
                                                <div className="flex items-center gap-2">
                                                    <select
                                                        value={selectedSubsection[section.id] || section.subsections?.[0]?.id || ''}
                                                        onChange={(e) => setSelectedSubsection(prev => ({ ...prev, [section.id]: e.target.value }))}
                                                        className="flex-1 p-2 text-sm border border-gray-300 rounded bg-white focus:ring-2 focus:ring-gray-500 outline-none font-medium"
                                                    >
                                                        {section.subsections?.map((subsec) => (
                                                            <option key={subsec.id} value={subsec.id}>{subsec.title}</option>
                                                        ))}
                                                    </select>

                                                    {(() => {
                                                        const currentSubsecId = selectedSubsection[section.id] || section.subsections?.[0]?.id;
                                                        const currentSubsec = section.subsections?.find(s => s.id === currentSubsecId);
                                                        if (!currentSubsec) return null;
                                                        return (
                                                            <div className="flex gap-1">
                                                                <button
                                                                    onClick={() => handleAIRefineProtocol(section.id, currentSubsecId)}
                                                                    disabled={aiLoading}
                                                                    className="p-1.5 bg-purple-50 text-purple-600 border border-purple-200 rounded hover:bg-purple-100 transition-colors disabled:opacity-50"
                                                                    title="✨ AI 完善步骤"
                                                                >
                                                                    <IconSparkles className="w-3 h-3" />
                                                                </button>
                                                                <label className="flex items-center gap-1 text-xs font-bold cursor-pointer bg-blue-50 text-blue-700 px-2 py-2 rounded border border-blue-200 hover:bg-blue-100 transition-colors">
                                                                    <input
                                                                        type="checkbox"
                                                                        checked={currentSubsec.selected || false}
                                                                        onChange={(e) => {
                                                                            setSections(prev => prev.map(sec => {
                                                                                if (sec.id !== section.id) return sec;
                                                                                return {
                                                                                    ...sec,
                                                                                    subsections: sec.subsections.map(sub =>
                                                                                        sub.id === currentSubsecId ? { ...sub, selected: e.target.checked } : sub
                                                                                    )
                                                                                };
                                                                            }));
                                                                        }}
                                                                    />
                                                                    生成
                                                                </label>
                                                            </div>
                                                        );
                                                    })()}
                                                </div>

                                                {(() => {
                                                    const currentSubsecId = selectedSubsection[section.id] || section.subsections?.[0]?.id;
                                                    const currentSubsec = section.subsections?.find(s => s.id === currentSubsecId);
                                                    if (!currentSubsec) return null;

                                                    return (
                                                        <div className="space-y-3">
                                                            <textarea
                                                                value={currentSubsec.content}
                                                                onChange={(e) => {
                                                                    setSections(prev => prev.map(sec => {
                                                                        if (sec.id !== section.id) return sec;
                                                                        return {
                                                                            ...sec,
                                                                            subsections: sec.subsections.map(sub =>
                                                                                sub.id === currentSubsec.id ? { ...sub, content: e.target.value } : sub
                                                                            )
                                                                        };
                                                                    }));
                                                                }}
                                                                className="w-full text-xs text-gray-600 p-2 bg-white rounded border border-gray-200 focus:ring-1 focus:ring-gray-300 outline-none resize-y min-h-[120px] font-mono leading-relaxed"
                                                                placeholder={`${currentSubsec.title} 的具体步骤...`}
                                                            />

                                                            {currentSubsec.id === 'subsec-immunostaining' && (
                                                                <div className="pt-2 border-t border-gray-100">
                                                                    <div className="flex items-center justify-between mb-2">
                                                                        <span className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">时间点记录 (含年月日)</span>
                                                                        <button
                                                                            onClick={() => addTimePoint(section.id, currentSubsec.id)}
                                                                            className="flex items-center gap-1 text-[10px] bg-blue-600 text-white px-2 py-1 rounded hover:bg-blue-700 transition-colors"
                                                                        >
                                                                            <IconPlus className="w-3 h-3" /> 添加记录
                                                                        </button>
                                                                    </div>

                                                                    <div className="space-y-2">
                                                                        {currentSubsec.timePoints?.map((tp) => (
                                                                            <div key={tp.id} className="flex flex-col gap-2 bg-gray-50 p-2 rounded border border-gray-100">
                                                                                <div className="flex items-center gap-2">
                                                                                    <div className="flex items-center gap-1 flex-1">
                                                                                        <IconCalendar className="w-3 h-3 text-gray-400" />
                                                                                        <input
                                                                                            type="date"
                                                                                            value={tp.date}
                                                                                            onChange={(e) => updateTimePoint(section.id, currentSubsec.id, tp.id, 'date', e.target.value)}
                                                                                            className="text-[10px] border rounded p-0.5 bg-white outline-none focus:ring-1 focus:ring-blue-400 w-full"
                                                                                        />
                                                                                    </div>
                                                                                    <div className="flex items-center gap-1 flex-1">
                                                                                        <IconClock className="w-3 h-3 text-gray-400" />
                                                                                        <input
                                                                                            type="time"
                                                                                            value={tp.time}
                                                                                            onChange={(e) => updateTimePoint(section.id, currentSubsec.id, tp.id, 'time', e.target.value)}
                                                                                            className="text-[10px] border rounded p-0.5 bg-white outline-none focus:ring-1 focus:ring-blue-400 w-full"
                                                                                        />
                                                                                    </div>
                                                                                    <button
                                                                                        onClick={() => removeTimePoint(section.id, currentSubsec.id, tp.id)}
                                                                                        className="text-gray-300 hover:text-red-500"
                                                                                    >
                                                                                        <IconX className="w-3 h-3" />
                                                                                    </button>
                                                                                </div>
                                                                                <input
                                                                                    type="text"
                                                                                    value={tp.label}
                                                                                    onChange={(e) => updateTimePoint(section.id, currentSubsec.id, tp.id, 'label', e.target.value)}
                                                                                    placeholder="备注 (如：Primary Ab...)"
                                                                                    className="w-full text-[10px] border rounded p-1 bg-white outline-none focus:ring-1 focus:ring-blue-400"
                                                                                />
                                                                            </div>
                                                                        ))}
                                                                    </div>
                                                                </div>
                                                            )}
                                                        </div>
                                                    );
                                                })()}
                                            </div>
                                        ) : (
                                            <textarea
                                                value={section.content}
                                                onChange={(e) => handleSectionContentChange(section.id, e.target.value)}
                                                className="w-full text-xs text-gray-600 p-2 bg-gray-50 rounded border-transparent focus:bg-white focus:ring-1 focus:ring-gray-200 outline-none resize-y min-h-[100px] font-mono leading-relaxed"
                                                placeholder="输入内容..."
                                            />
                                        )}
                                    </div>
                                ))}

                                <button
                                    onClick={addSection}
                                    className="w-full py-2 border-2 border-dashed border-gray-300 rounded-lg text-gray-500 hover:border-gray-500 hover:text-gray-600 flex items-center justify-center gap-2 transition-colors font-medium text-sm"
                                >
                                    <IconPlus className="w-4 h-4" /> 添加文本板块
                                </button>
                            </div>
                        </div>

                        {/* 底部操作 */}
                        <div className="p-4 border-t border-gray-200 bg-white">
                            <button onClick={handlePrint} className="w-full bg-gray-800 hover:bg-gray-900 text-white py-3 rounded-lg flex items-center justify-center gap-2 font-semibold shadow">
                                <IconPrinter className="w-5 h-5" /> 导出 PDF / 打印
                            </button>
                        </div>
                    </div>

                    {/* --- 右侧面板：16K 预览区域 --- */}
                    <div className="print-visible flex-1 bg-gray-200 p-8 overflow-y-auto print:p-0 print:bg-white print:overflow-visible">

                        <div
                            className="mx-auto bg-white shadow-2xl print:shadow-none print:mx-0 relative flex flex-col"
                            style={{
                                width: PAPER_SIZES[paperSize].width,
                                minHeight: PAPER_SIZES[paperSize].height,
                                padding: '15mm 15mm',
                            }}
                        >
                            {/* --- 简洁头部 --- */}
                            <header className="mb-4 border-b-2 border-black pb-2 font-serif">
                                <div className="flex justify-between items-end text-[9pt] text-black">
                                    <div className="italic font-bold text-[10pt]">{meta.labName}</div>

                                    <div className="flex gap-6">
                                        <span><strong>Date:</strong> {meta.date} {meta.time}</span>
                                        <span><strong>Res:</strong> {meta.researcher}</span>
                                        <span><strong>Sup:</strong> {meta.supervisor}</span>
                                    </div>
                                </div>
                            </header>

                            {/* --- 内容区域 --- */}
                            <div className="flex-1 space-y-4 font-serif">
                                {sections.map((section) => (
                                    <section key={section.id} className="break-inside-avoid">
                                        <h2 className="text-[9pt] font-bold text-black mb-1 uppercase border-b border-gray-400 inline-block pr-2">
                                            {section.title}
                                        </h2>

                                        <div className="text-[8pt] leading-snug text-justify text-black mt-1 pl-1">
                                            {section.type === 'mixed-list' ? (
                                                <div className="grid grid-cols-2 gap-x-6 gap-y-1">
                                                    {section.items?.map((item, idx) => (
                                                        <div key={item.id} className="flex">
                                                            <span className="font-bold mr-1">{idx + 1}.</span>
                                                            <span className="whitespace-nowrap overflow-hidden text-ellipsis">
                                                                <span className="font-semibold">{item.animalType}</span>
                                                                <span>({item.age}), </span>
                                                                <span>Group ({item.group})</span>
                                                                <span> — </span>
                                                                {item.note && <span>{item.note}, </span>}
                                                                <span className="italic">{item.side}</span>
                                                            </span>
                                                        </div>
                                                    ))}
                                                </div>
                                            ) : section.type === 'protocol-sections' ? (
                                                <div className="space-y-3">
                                                    {section.subsections?.filter(subsec => subsec.selected).map((subsec) => (
                                                        <div key={subsec.id}>
                                                            <div className="font-bold text-[8pt] mb-0.5">[{subsec.title}]</div>
                                                            {subsec.content && <div className="whitespace-pre-wrap pl-2 mb-1">{subsec.content}</div>}
                                                            {subsec.id === 'subsec-immunostaining' && subsec.timePoints && subsec.timePoints.length > 0 && (
                                                                <div className="pl-4 mt-2 border-l-2 border-gray-100 py-1 space-y-1">
                                                                    {subsec.timePoints.map(tp => (
                                                                        <div key={tp.id} className="text-[7.5pt] flex items-center gap-2">
                                                                            <span className="font-bold min-w-[120px]">⏰ {tp.date} {tp.time}</span>
                                                                            {tp.label && <span className="text-gray-600 italic"> — {tp.label}</span>}
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            )}
                                                        </div>
                                                    ))}
                                                </div>
                                            ) : (
                                                <div className="whitespace-pre-wrap">{section.content}</div>
                                            )}
                                        </div>
                                    </section>
                                ))}
                            </div>

                            {/* --- 页脚 --- */}
                            <footer className="mt-auto pt-4 border-t border-black flex justify-between items-end text-[7pt] font-serif text-black">
                                <div>{meta.date}</div>
                                <div>第 1 页</div>
                            </footer>
                        </div>
                    </div>
                </div>
            );
        };

        const rootElement = document.getElementById('root');
        if (rootElement) {
            const root = ReactDOM.createRoot(rootElement);
            root.render(<App />);
        }
    </script>
</body>

</html>
